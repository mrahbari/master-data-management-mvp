server:
  port: 8080

spring:
  application:
    name: customer-ingestion-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mdm_ingestion}
    username: ${DB_USERNAME:mdm_user}
    password: ${DB_PASSWORD:mdm_password}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

kafka:
  topics:
    customer-raw: customer.raw
  event-version: "1.0"

idempotency:
  key:
    ttl-hours: 24
    auto-generated-ttl-hours: 6

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    kafka:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p){blue} %clr([%t]){magenta} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n"
  level:
    root: INFO
    com.mdm: DEBUG
  file:
    name: ./logs/ingestion.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
