apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-mastering-service
  namespace: mdm-system
  labels:
    app: customer-mastering-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-mastering-service
  template:
    metadata:
      labels:
        app: customer-mastering-service
    spec:
      containers:
        - name: customer-mastering-service
          image: mdm/customer-mastering-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
            - containerPort: 8081
              name: metrics
          envFrom:
            - configMapRef:
                name: mdm-config
            - secretRef:
                name: mdm-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
---
apiVersion: v1
kind: Service
metadata:
  name: customer-mastering-service
  namespace: mdm-system
  labels:
    app: customer-mastering-service
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8081
      protocol: TCP
      name: http
    - port: 9091
      targetPort: 8081
      protocol: TCP
      name: metrics
  selector:
    app: customer-mastering-service
