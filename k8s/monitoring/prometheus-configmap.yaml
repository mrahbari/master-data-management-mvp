apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: mdm-system
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      scrape_timeout: 10s

    # Alerting configuration
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
              - alertmanager:9093

    # Rule files
    rule_files:
      - /etc/prometheus/rules/mdm-alerts.yml

    # Scrape configurations
    scrape_configs:
      # Prometheus self-monitoring
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
        metrics_path: /metrics

      # MDM Customer Mastering Service
      - job_name: 'customer-mastering-service'
        metrics_path: /actuator/prometheus
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - mdm-system
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: customer-mastering-service
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: 8081
        metric_relabel_configs:
          - source_labels: [__name__]
            regex: 'mdm_.*'
            action: keep

      # MDM Customer Ingestion Service
      - job_name: 'customer-ingestion-service'
        metrics_path: /actuator/prometheus
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - mdm-system
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: customer-ingestion-service
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: 8080

      # Kafka monitoring
      - job_name: 'kafka'
        static_configs:
          - targets: ['kafka:9092']
        metrics_path: /metrics

      # PostgreSQL monitoring (via exporter)
      - job_name: 'postgres'
        static_configs:
          - targets: ['postgres-exporter:9187']

      # JVM metrics for all Java services
      - job_name: 'jvm'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - mdm-system
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
